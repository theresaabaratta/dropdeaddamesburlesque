<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Contact | Drop Dead Revue</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg-dark: #12070d;
      --wine: #6f1d3a;
      --gold: #d6b36a;
      --cream: #f7efe6;
      --muted: #d8c7bb;
    }

    body {
      background: linear-gradient(180deg, #0f060b 0%, #1b0a13 60%, #12070d 100%);
      color: var(--cream);
      font-family: Arial, sans-serif;
    }

    h1, h2, h3, .brand-font {
      font-family: Georgia, serif;
    }

    .navbar {
      background: rgba(10, 3, 7, 0.9);
    }

    .navbar-brand {
      color: var(--gold);
      font-weight: bold;
    }

    .nav-link {
      color: var(--muted);
    }

    .nav-link:hover {
      color: #fff;
    }

    .hero {
      padding: 140px 0 80px;
      text-align: center;
      background:
        linear-gradient(rgba(10,3,7,0.75), rgba(10,3,7,0.85)),
        url("https://images.unsplash.com/photo-1516280440614-37939bbacd81?auto=format&fit=crop&w=1600&q=80")
        center/cover no-repeat;
    }

    .section {
      padding: 80px 0;
    }

    .form-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(214, 179, 106, 0.2);
      border-radius: 20px;
      padding: 2rem;
      max-width: 700px;
      margin: auto;
    }

    .form-control, .form-select {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
    }

    .form-control::placeholder {
      color: #ccc;
    }

    .form-control:focus, .form-select:focus {
      background: rgba(255,255,255,0.08);
      border-color: var(--gold);
      box-shadow: none;
      color: #fff;
    }

    .btn-gold {
      background: linear-gradient(135deg, var(--gold), #f1d08a);
      color: #2a1610;
      font-weight: bold;
      border: none;
      padding: 0.9rem;
    }

    footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg fixed-top">
  <div class="container">
    <a class="navbar-brand brand-font" href="#">Drop Dead Revue</a>
    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon" style="filter: invert(1);"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="#">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="#">About</a></li>
        <li class="nav-item"><a class="nav-link active text-white" href="#">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <h1 class="display-4 brand-font">Book the Revue</h1>
    <p class="lead mt-3" style="color:#e6d6c8;">
      Tell us about your event and we’ll bring the experience to you.
    </p>
  </div>
</section>

<!-- FORM -->
<section class="section">
  <div class="container">
    <div class="form-card">

      <form>

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Your Name</label>
            <input type="text" class="form-control" placeholder="Enter your name" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Group / Event Name</label>
            <input type="text" class="form-control" placeholder="Optional">
          </div>

          <div class="col-md-6">
            <label class="form-label">Event Date</label>
            <input type="date" class="form-control" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Event Type</label>
            <select class="form-select">
              <option selected>Select event type</option>
              <option>Private Party</option>
              <option>Birthday</option>
              <option>Bachelorette</option>
              <option>Nightlife Event</option>
              <option>Other</option>
            </select>
          </div>

          <div class="col-12">
            <label class="form-label">Location</label>
            <input type="text" class="form-control" placeholder="City / Venue / Address" required>
          </div>

          <div class="col-12">
            <label class="form-label">Tell Us About Your Event</label>
            <textarea class="form-control" rows="5" placeholder="Details, vibe, group size, etc."></textarea>
          </div>

          <div class="col-12">
            <button type="submit" class="btn btn-gold w-100 rounded-pill">
              Submit Booking Request
            </button>
          </div>
        </div>

      </form>

    </div>
  </div>
</section>

<!-- FOOTER -->
<footer class="py-4 text-center">
  <div class="container">
    <p class="mb-1">© 2026 Drop Dead Revue</p>
    <small>Burlesque • Cabaret • Private Events</small>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
